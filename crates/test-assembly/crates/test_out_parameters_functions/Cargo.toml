[package]
name = "test_out_parameters_functions"
version = "0.1.0"
edition.workspace = true
publish = false

[lib]
path = "lib.rs"

[target.'cfg(target_vendor = "apple")'.dependencies]
objc2-core-foundation = { path = "../../../../framework-crates/objc2-core-foundation", default-features = false, features = [
    "std",
    "CFError",
    "CFString",
] }
objc2-security = { path = "../../../../framework-crates/objc2-security", default-features = false, features = [
    "std",
    "SecTrust",
] }
objc2-core-media = { path = "../../../../framework-crates/objc2-core-media", default-features = false, features = [
    "std",
    "objc2-core-audio",
    "CMAudioDeviceClock",
    "CMSync",
] }

[features]
# Runtime
gnustep-1-7 = []
gnustep-1-8 = ["gnustep-1-7"]
gnustep-1-9 = ["gnustep-1-8"]
gnustep-2-0 = ["gnustep-1-9"]
gnustep-2-1 = ["gnustep-2-0"]

# Hack
assembly-features = []

[package.metadata.release]
release = false
