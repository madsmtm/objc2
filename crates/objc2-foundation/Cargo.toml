[package]
name = "objc2-foundation"
version = "0.2.0"
description = "Bindings to the Foundation framework"
edition = "2021"
rust-version = "1.64"
keywords = ["macos", "ios", "cocoa", "apple", "framework"]
categories = [
    "api-bindings",
    "development-tools::ffi",
    "external-ffi-bindings",
    "os::macos-apis",
]
repository = "https://github.com/madsmtm/objc2"
license = "MIT"

[dependencies]
objc2 = { path = "../objc2", version = "0.5.0", default-features = false }
block2 = { path = "../block2", version = "0.4.0", default-features = false, optional = true }
dispatch = { version = "0.2.0", optional = true }
objc2-helpers = { path = "../objc2-helpers" }

[dev-dependencies]
static_assertions = "1.1.0"

[package.metadata.docs.rs]
default-target = "aarch64-apple-darwin"
features = ["block2", "dispatch", "libc", "all", "unstable-docsrs"]
targets = [
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
    "aarch64-apple-ios",
    "aarch64-apple-tvos",
    "aarch64-apple-watchos",
]

[[example]]
name = "basic_usage"
required-features = [
    "Foundation_NSArray",
    "Foundation_NSDictionary",
    "Foundation_NSEnumerator",
    "Foundation_NSRange",
    "Foundation_NSObject",
]

[[example]]
name = "speech_synthesis"
required-features = [
    "apple",
    "Foundation",
    "Foundation_NSString",
    "Foundation_NSObject",
]

[features]
default = [
    "std",
    "apple",
    "block2",
    "objc2",
    "Foundation_NSObjCRuntime",
    "Foundation_NSString",
    "Foundation_NSDictionary",
    "Foundation_NSEnumerator",
]

# Currently not possible to turn off, put here for forwards compatibility.
std = ["alloc", "objc2/std", "block2?/std", "objc2"]
alloc = ["objc2/alloc", "block2?/alloc"]

# Runtime selection. See `objc-sys` for details.
apple = ["objc2/apple", "block2?/apple"]
gnustep-1-7 = ["objc2/gnustep-1-7", "block2?/gnustep-1-7"]
gnustep-1-8 = ["gnustep-1-7", "objc2/gnustep-1-8", "block2?/gnustep-1-8"]
gnustep-1-9 = ["gnustep-1-8", "objc2/gnustep-1-9", "block2?/gnustep-1-9"]
gnustep-2-0 = ["gnustep-1-9", "objc2/gnustep-2-0", "block2?/gnustep-2-0"]
gnustep-2-1 = ["gnustep-2-0", "objc2/gnustep-2-1", "block2?/gnustep-2-1"]

objc2 = ["objc2-helpers/objc2"] # Required
block2 = ["dep:block2", "objc2-helpers/block2"]
dispatch = ["dep:dispatch"]

# For better documentation on docs.rs
unstable-docsrs = []

# Make the `ns_string!` macro create the string statically.
#
# Please test it, and report any issues you may find:
# https://github.com/madsmtm/objc2/issues/new
unstable-static-nsstring = []

