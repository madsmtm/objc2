framework = "DiskArbitration"
crate = "objc2-disk-arbitration"
required-crates = ["objc2-core-foundation"]
custom-lib-rs = true
macos = "10.4"
maccatalyst = "13.0"

# Needs io_service_t from IOKit
fn.DADiskCreateFromIOMedia.skipped = true
fn.DADiskCopyIOMedia.skipped = true

# Uses `err_local` and `err_local_diskarbitration`, which
# are not exposed by the `libc` crate.
const.kDAReturnError.use-value = true
const.kDAReturnBusy.use-value = true
const.kDAReturnBadArgument.use-value = true
const.kDAReturnExclusiveAccess.use-value = true
const.kDAReturnNoResources.use-value = true
const.kDAReturnNotFound.use-value = true
const.kDAReturnNotMounted.use-value = true
const.kDAReturnNotPermitted.use-value = true
const.kDAReturnNotPrivileged.use-value = true
const.kDAReturnNotReady.use-value = true
const.kDAReturnNotWritable.use-value = true
const.kDAReturnUnsupported.use-value = true

# Fix generics
fn.DADiskCopyDescription.return.generics = ["CoreFoundation.CFString.CFString", "CoreFoundation.CFType"]
fn.DARegisterDiskAppearedCallback.arguments.1.generics = ["CoreFoundation.CFString.CFString", "CoreFoundation.CFType"]
fn.DARegisterDiskDescriptionChangedCallback.arguments.1.generics = ["CoreFoundation.CFString.CFString", "CoreFoundation.CFType"]
fn.DARegisterDiskDescriptionChangedCallback.arguments.2.generics = ["CoreFoundation.CFString.CFString"]
fn.DARegisterDiskDisappearedCallback.arguments.1.generics = ["CoreFoundation.CFString.CFString", "CoreFoundation.CFType"]
fn.DARegisterDiskMountApprovalCallback.arguments.1.generics = ["CoreFoundation.CFString.CFString", "CoreFoundation.CFType"]
fn.DARegisterDiskUnmountApprovalCallback.arguments.1.generics = ["CoreFoundation.CFString.CFString", "CoreFoundation.CFType"]
fn.DARegisterDiskEjectApprovalCallback.arguments.1.generics = ["CoreFoundation.CFString.CFString", "CoreFoundation.CFType"]
fn.DARegisterDiskPeekCallback.arguments.1.generics = ["CoreFoundation.CFString.CFString", "CoreFoundation.CFType"]
