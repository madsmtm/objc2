framework = "AudioToolbox"
crate = "objc2-audio-toolbox"
required-crates = []
custom-lib-rs = true
flags = [
    # Make AudioToolbox less dependent on CoreServices
    "-DAUDIOCOMPONENT_NOCARBONINSTANCES=1",
]
macos = "10.0"
maccatalyst = "13.1"
ios = "2.0"
tvos = "9.0"
visionos = "1.0"

